# Local Docker — single node, multi-GPU with torchrun
# madengine run --config examples/configs/demo/local/multi-gpu-torchrun.yaml

model:
  tags: [dummy_torchrun]

distributed:
  enabled: true
  launcher: torchrun
  nnodes: 1
  nproc_per_node: 4
  master_port: 29500

env_vars:
  OMP_NUM_THREADS: "8"
  NCCL_DEBUG: WARN
